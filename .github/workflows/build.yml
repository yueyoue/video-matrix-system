name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Web Admin
        run: cd web-admin && npm ci && npm run build
      - name: Package
        run: |
          zip -r server.zip server/ -x "server/uploads/*"
          cd web-admin/dist && zip -r ../../web-admin.zip . && cd ../..
          zip -r client.zip client/ -x "client/__pycache__/*" "client/**/*.pyc"
      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## 短视频矩阵运营系统 ${{ steps.version.outputs.tag }}
            - `VideoMatrix.zip` - 桌面客户端 Windows 版 (解压后运行 VideoMatrix.exe)
            - `server.zip` - 后端API (PHP+MySQL，上传到宝塔访问域名/install安装)
            - `web-admin.zip` - Web管理后台 (解压到网站根目录)
          files: |
            server.zip
            web-admin.zip
            client.zip
          draft: false
          prerelease: false

  build-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install pyinstaller PyQt6 requests
      - name: Build exe (onedir mode)
        run: |
          pyinstaller --noconfirm --onedir --windowed --name VideoMatrix --noconsole --collect-all PyQt6 main.py
        shell: cmd
        working-directory: client
      - name: Create launcher bat
        run: |
          echo @echo off > client\dist\VideoMatrix\启动客户端.bat
          echo start VideoMatrix.exe >> client\dist\VideoMatrix\启动客户端.bat
        shell: cmd
      - name: Zip dist
        run: |
          cd client/dist
          powershell Compress-Archive -Path VideoMatrix -DestinationPath ../../VideoMatrix.zip -Force
        shell: bash
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: client/VideoMatrix.zip
