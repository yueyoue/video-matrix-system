name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Web Admin
        run: cd web-admin && npm ci && npm run build

      - name: Package
        run: |
          cd server && npm ci --omit=dev && cd ..
          zip -r server.zip server/ -x "server/node_modules/.cache/*"
          cd web-admin/dist && zip -r ../../web-admin.zip . && cd ../..
          zip -r client.zip client/ -x "client/__pycache__/*" "client/**/*.pyc"

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## 短视频矩阵运营系统 ${{ steps.version.outputs.tag }}
            
            ### 下载说明
            - `VideoMatrix.exe` - 桌面客户端 Windows 版 (见下方 Windows 构建)
            - `server.zip` - 后端API服务 (解压后 `npm install --production && npm start`)
            - `web-admin.zip` - Web管理后台 (Nginx部署)
            
            ### 默认账号
            - 管理员: admin / admin123
            - 运营员: operator1 / 123456
          files: |
            server.zip
            web-admin.zip
            client.zip
          draft: false
          prerelease: false

  build-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller & deps
        run: |
          cd client
          pip install pyinstaller PyQt6 requests

      - name: Build exe
        run: |
          cd client
          pyinstaller --noconfirm --onefile --windowed --name VideoMatrix main.py
        shell: cmd

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: client/dist/VideoMatrix.exe
