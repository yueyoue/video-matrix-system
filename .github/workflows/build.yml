name: Build & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Web Admin
        run: cd web-admin && npm ci && npm run build

      - name: Package deploy.zip (PHP + Vue 合并包)
        run: |
          mkdir -p deploy
          cp server/index.php deploy/
          cp server/.htaccess deploy/
          cp server/config.sample.php deploy/
          cp -r server/api deploy/
          cp -r server/includes deploy/
          cp -r server/install deploy/
          cp server/nginx.conf deploy/
          mkdir -p deploy/uploads
          cp web-admin/dist/index.html deploy/
          cp -r web-admin/dist/assets deploy/
          cd deploy && zip -r ../deploy.zip .

      - name: Package client source
        run: zip -r client.zip client/ -x "client/__pycache__/*" "client/**/*.pyc"

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## 短视频矩阵运营系统 ${{ steps.version.outputs.tag }}
            
            ### 下载说明
            - `deploy.zip` - **服务端一体化包**（上传到宝塔解压，访问 域名/install 安装）
            - `VideoMatrix.zip` - 桌面客户端 Windows 版（解压运行 VideoMatrix.exe）
            
            ### 宝塔部署（3步）
            1. 新建网站，上传 `deploy.zip` 解压到根目录
            2. 浏览器访问 `域名/install` 按提示安装
            3. 删掉 install 目录，完成！
          files: |
            deploy.zip
            client.zip
          draft: false
          prerelease: false

  build-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clean cache
        run: |
          rm -rf client/build client/dist client/__pycache__
          find client -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find client -name "*.pyc" -delete 2>/dev/null || true
        shell: bash
      - name: Build exe
        run: |
          pip install pyinstaller PyQt6 PyQt6-WebEngine requests
          pyinstaller --clean --noconfirm --onedir --windowed --name VideoMatrix --noconsole --collect-all PyQt6 --exclude-module PyQt6.Qt3D --exclude-module PyQt6.QtMultimedia --exclude-module PyQt6.QtBluetooth --exclude-module PyQt6.QtNfc --exclude-module PyQt6.QtPositioning --exclude-module PyQt6.QtQuick --exclude-module PyQt6.QtQml --exclude-module PyQt6.QtRemoteObjects --exclude-module PyQt6.QtSensors --exclude-module PyQt6.QtSerialPort --exclude-module PyQt6.QtSvg --exclude-module PyQt6.QtTest --exclude-module PyQt6.QtHelp --exclude-module PyQt6.QtDesigner --exclude-module PyQt6.QtShaderTools --exclude-module PyQt6.QtSpatialAudio --exclude-module PyQt6.QtHttpServer --exclude-module PyQt6.QtPdf --exclude-module PyQt6.QtStateMachine --exclude-module PyQt6.QtUiTools main.py
        shell: cmd
        working-directory: client
      - name: Zip dist
        run: |
          cd client/dist
          powershell Compress-Archive -Path VideoMatrix -DestinationPath ../../VideoMatrix.zip -Force
        shell: bash
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          files: VideoMatrix.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
